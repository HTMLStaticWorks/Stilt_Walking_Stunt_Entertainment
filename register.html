<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stilt & Stunt | Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body class="dark-mode hero-section" style="background: url('https://images.unsplash.com/photo-1549488344-1f9b8d2bd1f3?w=1920&q=80') no-repeat center center/cover;">

    <div class="hero-overlay"></div>
    <div class="glow-orb orb-2"></div>
    
    <!-- Top Nav Minimal -->
    <nav class="navbar navbar-expand-lg fixed-top py-3" style="z-index: 10;">
        <div class="container d-flex justify-content-end gap-3">
            <a href="#" id="theme-toggle" class="nav-link p-0 fs-5 text-white"><i class="fa-solid fa-moon"></i></a>
            <a href="#" id="rtl-toggle" class="nav-link p-0 fw-bold text-white" style="font-size: 0.9rem;">RTL</a>
        </div>
    </nav>

    <div class="container position-relative z-2">
        <div class="row justify-content-center align-items-center" style="min-height: 100vh; padding-top: 80px; padding-bottom: 40px;">
            <div class="col-md-8 col-lg-6 fade-up">
                <div class="glass-card p-4 p-md-5">
                    <div class="text-center">
                        <a class="navbar-brand text-uppercase fw-bold d-inline-block mb-4" href="index.html" style="font-family: var(--font-heading); font-size: 1.8rem; letter-spacing: 2px; color: white;">
                            <i class="fa-solid fa-wand-magic-sparkles me-2" style="color: var(--electric-gold);"></i>
                            <span style="color: var(--electric-gold);">Stilt</span>&Stunt
                        </a>
                        <h2 class="mb-2" style="font-family: var(--font-heading);">Create Account</h2>
                        <p class="text-white-50 mb-4 small">Join to manage bookings and invoices.</p>
                    </div>
                    
                    <form>
                        <div class="row g-3">
                            <div class="col-12 text-start">
                                <label class="form-label text-white-50 small">First Name</label>
                                <input type="text" class="form-control bg-transparent text-white border-secondary shadow-none" placeholder="John">
                            </div>
                            <div class="col-12 text-start">
                                <label class="form-label text-white-50 small">Last Name</label>
                                <input type="text" class="form-control bg-transparent text-white border-secondary shadow-none" placeholder="Doe">
                            </div>
                            <div class="col-12 text-start">
                                <label class="form-label text-white-50 small">Email Address</label>
                                <input type="email" class="form-control bg-transparent text-white border-secondary shadow-none" placeholder="name@example.com">
                            </div>
                            <div class="col-12 text-start position-relative">
                                <label class="form-label text-white-50 small">Password</label>
                                <input type="password" class="form-control bg-transparent text-white border-secondary shadow-none" placeholder="••••••••">
                            </div>
                            <div class="col-12">
                                <div class="form-check text-start">
                                    <input class="form-check-input bg-transparent border-secondary shadow-none" type="checkbox" id="terms">
                                    <label class="form-check-label text-white-50 small" for="terms">
                                        I agree to the <a href="#" style="color: var(--electric-gold);">Terms of Service</a>
                                    </label>
                                </div>
                            </div>
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-premium w-100 py-2">Register</button>
                            </div>
                        </div>
                        
                        <div class="position-relative my-4">
                            <hr class="border-secondary">
                            <span class="position-absolute top-50 start-50 translate-middle px-2 small text-white-50" style="background: var(--primary-black);">OR</span>
                        </div>
                        
                        <div class="d-flex gap-2 justify-content-center mb-4">
                            <button type="button" class="btn btn-outline-light w-100"><i class="fa-brands fa-google me-2"></i> Google</button>
                            <button type="button" class="btn btn-outline-light w-100"><i class="fa-brands fa-facebook me-2"></i> Facebook</button>
                        </div>
                        
                        <p class="text-center text-white-50 small mb-0">Already have an account? <a href="login.html" class="text-decoration-none fw-bold" style="color: var(--electric-gold);">Sign In</a></p>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
