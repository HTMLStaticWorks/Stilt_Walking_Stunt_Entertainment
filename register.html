<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stilt & Stunt | Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <style>
        .auth-divider-badge {
            background: rgba(7, 7, 7, 0.72) !important;
            color: rgba(255, 255, 255, 0.85) !important;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 999px;
        }

        .auth-social-btn {
            color: #ffffff !important;
            border-color: rgba(255, 255, 255, 0.75) !important;
            background: rgba(255, 255, 255, 0.02) !important;
        }

        .auth-social-btn i {
            color: #ffffff !important;
        }

        body:not(.dark-mode) .auth-divider-badge {
            background: rgba(255, 255, 255, 0.92) !important;
            color: rgba(17, 17, 17, 0.72) !important;
            border-color: rgba(17, 17, 17, 0.14);
        }

        body:not(.dark-mode) .auth-social-btn {
            color: #111111 !important;
            border-color: rgba(17, 17, 17, 0.3) !important;
            background: rgba(255, 255, 255, 0.55) !important;
        }

        body:not(.dark-mode) .auth-social-btn i {
            color: #111111 !important;
        }

        .auth-link {
            color: var(--electric-gold) !important;
        }

        body:not(.dark-mode) .auth-link {
            color: #b58900 !important; /* Darker gold for light mode */
            font-weight: bold;
        }
    </style>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23070707'/%3E%3Cpath d='M14 42L28 18H38L24 42Z' fill='%23f5c542'/%3E%3Crect x='39' y='18' width='11' height='24' rx='2' fill='%23f5c542'/%3E%3C/svg%3E">
</head>
<body class="dark-mode hero-section" style="background-image: none !important;">

    <div class="hero-overlay"></div>
    <div class="glow-orb orb-2"></div>
    
    <!-- Top Nav Minimal -->
    <nav class="navbar navbar-expand-lg fixed-top py-3" style="z-index: 10;">
        <div class="container d-flex justify-content-end gap-3">
            <a href="#" id="theme-toggle" class="nav-link p-0 fs-5"><i class="fa-solid fa-moon"></i></a>
            <a href="#" id="rtl-toggle" class="nav-link p-0 fw-bold" style="font-size: 0.9rem;">RTL</a>
        </div>
    </nav>

    <div class="container position-relative z-2">
        <div class="row justify-content-center align-items-center" style="min-height: 100vh; padding-top: 80px; padding-bottom: 40px;">
            <div class="col-md-8 col-lg-6 fade-up">
                <div class="glass-card p-4 p-md-5">
                    <div class="text-center">
                        <a class="navbar-brand text-uppercase fw-bold d-inline-block mb-4" href="index.html" style="font-family: var(--font-heading); font-size: 1.8rem; letter-spacing: 2px; color: white;">
                            <i class="fa-solid fa-wand-magic-sparkles me-2" style="color: var(--electric-gold);"></i>
                            <span style="color: var(--electric-gold);">Stilt</span>&Stunt
                        </a>
                        <h2 class="mb-2" style="font-family: var(--font-heading);">Create Account</h2>
                        <p class="text-muted mb-4 small">Join to manage bookings and invoices.</p>
                    </div>
                    
                    <form>
                        <div class="row g-3">
                            <div class="col-12 text-start">
                                <label class="form-label text-muted small">First Name</label>
                                <input type="text" class="form-control bg-transparent border-secondary shadow-none" placeholder="John">
                            </div>
                            <div class="col-12 text-start">
                                <label class="form-label text-muted small">Last Name</label>
                                <input type="text" class="form-control bg-transparent border-secondary shadow-none" placeholder="Doe">
                            </div>
                            <div class="col-12 text-start">
                                <label class="form-label text-muted small">Email Address</label>
                                <input type="email" class="form-control bg-transparent border-secondary shadow-none" placeholder="name@example.com">
                            </div>
                            <div class="col-12 text-start position-relative">
                                <label class="form-label text-muted small">Password</label>
                                <input type="password" class="form-control bg-transparent border-secondary shadow-none" placeholder="********">
                            </div>
                            <div class="col-12">
                                <div class="form-check text-start">
                                    <input class="form-check-input bg-transparent border-secondary shadow-none" type="checkbox" id="terms">
                                    <label class="form-check-label text-muted small" for="terms">
                                        I agree to the <a href="#" class="auth-link">Terms of Service</a>
                                    </label>
                                </div>
                            </div>
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-premium w-100 py-2">Register</button>
                            </div>
                        </div>
                        
                        <div class="position-relative my-4">
                            <hr class="border-secondary">
                            <span class="position-absolute top-50 start-50 translate-middle px-2 small text-muted auth-divider-badge">OR</span>
                        </div>
                        
                        <div class="d-flex gap-2 justify-content-center mb-4">
                            <button type="button" class="btn btn-outline-light w-100 auth-social-btn"><i class="fa-brands fa-google me-2"></i> Google</button>
                            <button type="button" class="btn btn-outline-light w-100 auth-social-btn"><i class="fa-brands fa-facebook me-2"></i> Facebook</button>
                        </div>
                        
                        <p class="text-center text-muted small mb-0">Already have an account? <a href="login.html" class="text-decoration-none fw-bold auth-link">Sign In</a></p>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
